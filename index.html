<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TWINZ WORKSHOP DMS V10.8 | LIVE FIREBASE</title>
<meta name="theme-color" content="#2563eb">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-check-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap');
:root{ --accent:#2563eb; --accent2:#f97316; --cyan:#00D4FF; --red:#FF0040; --green:#00D26A; --gold:#fbbf24; }
body{font-family:'Rajdhani',sans-serif;background:#000;color:#fff;overflow-x:hidden}
#bg3d{position:fixed;inset:0;z-index:-1}
.quantum-text{font-family:'Orbitron',sans-serif;font-weight:900;text-shadow:0 0 15px var(--cyan)}
.glass{background:rgba(10,20,40,0.4);backdrop-filter:blur(25px);border:1px solid rgba(0,212,255,0.3);border-radius:24px}
.btn{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;padding:14px 24px;border-radius:14px;font-weight:900;border:none;cursor:pointer;min-height:48px}
.btn-sec{background:rgba(0,212,255,0.1);border:1px solid var(--cyan);color:var(--cyan);padding:10px 18px;border-radius:12px;cursor:pointer;min-height:48px}
input,select{background:#0A0F1F;border:1px solid rgba(0,212,255,0.4);color:#fff;padding:14px;border-radius:12px;width:100%;min-height:48px}
.hidden{display:none}.tab-btn{padding:12px 20px;border-radius:12px;cursor:pointer;font-weight:700}
.tab-btn.active{background:var(--cyan);color:#000}
.admin-bar{background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);border-bottom:2px solid var(--cyan);padding:12px;display:flex;gap:10px;justify-content:center;position:sticky;top:0;z-index:100;}
.grid{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:768px){.grid{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}}
.stat{padding:20px;border:1px solid rgba(37,99,235,0.3);border-radius:16px;background:rgba(15,23,42,0.5)}
.stat.num{font-size:32px;font-weight:900;color:var(--accent)}
.loading{position:fixed;inset:0;background:#000;z-index:9998;display:flex;align-items:center;justify-content:center}
.badge{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:900;background:var(--cyan);color:#000}
</style>
</head>
<body>
<div id="loading" class="loading"><div class="quantum-text text-3xl">TWINZ SYNC...</div></div>
<canvas id="bg3d"></canvas>

<div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
  <div class="glass p-10 max-w-2xl w-full">
    <h1 class="text-6xl text-center quantum-text mb-2">TWINZ DMS</h1>
    <p class="text-center text-cyan-400 mb-8">V10.8 | LIVE FIREBASE</p>
    <input id="loginEmail" placeholder="Email: ceo@twinz.co.za" class="mb-3">
    <input id="loginPassword" type="password" placeholder="Password Min 8 chars" class="mb-3">
    <button onclick="loginFirebase()" class="btn w-full">ENTER SYSTEM</button>
  </div>
</div>

<div id="app" class="hidden">
  <div class="admin-bar">
    <span class="badge" id="roleBadge">CEO</span>
    <button class="btn-sec" onclick="logout()">Logout</button>
  </div>

  <div class="p-4 flex gap-2 flex-wrap justify-center">
    <button class="tab-btn active" onclick="showTab('dashboard')">Dashboard</button>
    <button class="tab-btn" onclick="showTab('jobs')">Jobs</button>
    <button class="tab-btn" onclick="showTab('products')">Products</button>
    <button class="tab-btn" onclick="showTab('stock')">Stock</button>
    <button class="tab-btn" onclick="showTab('sales')">Sales</button>
    <button class="tab-btn" onclick="showTab('fleet')">Fleet</button>
    <button class="tab-btn" onclick="showTab('quotes')">Quotes</button>
    <button class="tab-btn" onclick="showTab('clients')">Clients</button>
    <button class="tab-btn" onclick="showTab('payroll')">Payroll</button>
    <button class="tab-btn" onclick="showTab('security')">Security</button>
    <button class="tab-btn" onclick="showTab('reports')">Reports</button>
  </div>

  <div id="dashboard" class="tab p-4">
    <h2 class="text-3xl quantum-text mb-4">Dashboard</h2>
    <div class="grid">
      <div class="stat"><div class="stat num" id="statRevenue">R0</div><div>Revenue</div></div>
      <div class="stat"><div class="stat num" id="statJobs">0</div><div>Active Jobs</div></div>
      <div class="stat"><div class="stat num" id="statStock">0</div><div>Stock Items</div></div>
      <div class="stat"><div class="stat num" id="statClients">0</div><div>Clients</div></div>
    </div>
  </div>

  <div id="jobs" class="tab p-4 hidden">
    <h2 class="text-3xl quantum-text mb-4">Jobs Management</h2>
    <button onclick="addJob()" class="btn mb-4">+ New Job</button>
    <div id="jobsList" class="grid"></div>
  </div>

  <div id="products" class="tab p-4 hidden">
    <h2 class="text-3xl quantum-text mb-4">Products</h2>
    <button onclick="addProduct()" class="btn mb-4">+ Add Product</button>
    <div id="productsList" class="grid"></div>
  </div>

  <div id="stock" class="tab p-4 hidden">
    <h2 class="text-3xl quantum-text mb-4">Stock Control</h2>
    <button onclick="addStock()" class="btn mb-4">+ Add Stock</button>
    <div id="stockList" class="grid"></div>
  </div>

  <div id="sales" class="tab p-4 hidden"><h2 class="text-3xl quantum-text mb-4">Sales</h2><div id="salesList"></div></div>
  <div id="fleet" class="tab p-4 hidden"><h2 class="text-3xl quantum-text mb-4">Fleet</h2><button onclick="addFleet()" class="btn mb-4">+ Add Vehicle</button><div id="fleetList" class="grid"></div></div>
  <div id="quotes" class="tab p-4 hidden"><h2 class="text-3xl quantum-text mb-4">Quotes</h2><button onclick="addQuote()" class="btn mb-4">+ New Quote</button><div id="quotesList"></div></div>
  <div id="clients" class="tab p-4 hidden"><h2 class="text-3xl quantum-text mb-4">Clients</h2><button onclick="addClient()" class="btn mb-4">+ Add Client</button><div id="clientsList"></div></div>
  <div id="payroll" class="tab p-4 hidden"><h2 class="text-3xl quantum-text mb-4">Payroll</h2><button onclick="addEmployee()" class="btn mb-4">+ Add Employee</button><div id="payrollList"></div></div>
  <div id="security" class="tab p-4 hidden"><h2 class="text-3xl quantum-text mb-4">Security & Users</h2><button onclick="showCreateUser()" class="btn mb-4">+ Create Staff</button><div id="usersList"></div></div>
  <div id="reports" class="tab p-4 hidden"><h2 class="text-3xl quantum-text mb-4">Reports</h2><button onclick="exportPDF()" class="btn">Export PDF</button></div>
</div>

<script>
const { jsPDF } = window.jspdf;
const firebaseConfig = {
  apiKey: "AIzaSyCy83BBRf12FlAOoWgg1jQO5eyWTYlhTeQ",
  authDomain: "twinz-dms.firebaseapp.com",
  databaseURL: "https://twinz-dms-default-rtdb.africa-south1.firebasedatabase.app",
  projectId: "twinz-dms",
  storageBucket: "twinz-dms.firebasestorage.app",
  messagingSenderId: "757498432732",
  appId: "1:757498432732:web:4ac54b82d97edaabd07819"
};
firebase.initializeApp(firebaseConfig);
firebase.appCheck().activate('DEBUG_MODE_FOR_NOW', true);
const auth = firebase.auth();
const db = firebase.database();

let DB = {jobs:[],products:[],stock:[],fleet:[],quotes:[],employees:[],clients:[],revenue:125000};
let currentRole=''; let currentUserId='';

function toast(msg){ const t=document.createElement('div'); t.style.cssText='position:fixed;bottom:20px;left:16px;right:16px;background:var(--accent);color:#fff;padding:14px;border-radius:12px;font-weight:900;z-index:999;text-align:center'; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }

function loginFirebase(){
  auth.signInWithEmailAndPassword(loginEmail.value,loginPassword.value).then(cred=>{
    currentUserId=cred.user.uid;
    db.ref('users/'+currentUserId).once('value').then(snap=>{
      if(!snap.exists()){ toast('No role assigned'); auth.signOut(); return; }
      currentRole=snap.val().role; loadCloudDB(); initApp();
    })
  }).catch(e=>toast('Login failed: '+e.message));
}

function logout(){auth.signOut();location.reload();}
function saveDB(){ db.ref('data/'+currentUserId).set(DB); updateStats(); }
function loadCloudDB(){ db.ref('data/'+currentUserId).on('value', snap=>{ if(snap.val()) DB=snap.val(); renderAll(); document.getElementById('loading').style.display='none'; }) }

const ACCESS = { CEO: ['dashboard','jobs','products','stock','sales','fleet','quotes','clients','payroll','security','reports'], WORKSHOP_MANAGER: ['dashboard','jobs','products','stock'], RECEPTION: ['dashboard','jobs','clients','quotes'], SALES: ['dashboard','sales','products','quotes'], HR: ['dashboard','payroll'], FLEET: ['dashboard','fleet'], TECHNICIAN: ['dashboard','jobs'], SECURITY: ['dashboard','security'], CUSTOMER: [] };

function initApp(){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('roleBadge').innerText=currentRole;
  document.querySelectorAll('.tab').forEach(t=>t.classList.add('hidden'));
  document.querySelectorAll('.tab-btn').forEach(b=>{
    const tabId = b.getAttribute('onclick').match(/'(.+?)'/)[1];
    b.style.display = ACCESS[currentRole].includes(tabId)? 'block' : 'none';
  });
  showTab('dashboard');
}
function showTab(id){document.querySelectorAll('.tab').forEach(t=>t.classList.add('hidden'));document.getElementById(id).classList.remove('hidden'); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');}

function renderAll(){
  updateStats();
  jobsList.innerHTML = DB.jobs.map((j,i)=>`<div class="glass p-4"><h3>Job #${i+1}</h3><p>${j.name||'New Job'}</p></div>`).join('');
  productsList.innerHTML = DB.products.map((p,i)=>`<div class="glass p-4"><h3>${p.name||'Product'}</h3></div>`).join('');
  stockList.innerHTML = DB.stock.map((s,i)=>`<div class="glass p-4"><h3>${s.name||'Item'}</h3></div>`).join('');
  fleetList.innerHTML = DB.fleet.map((f,i)=>`<div class="glass p-4"><h3>${f.name||'Vehicle'}</h3></div>`).join('');
}
function updateStats(){
  statRevenue.innerText = 'R' + (DB.revenue||0).toLocaleString();
  statJobs.innerText = DB.jobs.length;
  statStock.innerText = DB.stock.length;
  statClients.innerText = DB.clients.length;
}

// CRUD FUNCTIONS
function addJob(){ DB.jobs.push({name:'New Job',date:Date.now()}); saveDB(); }
function addProduct(){ DB.products.push({name:'New Product'}); saveDB(); }
function addStock(){ DB.stock.push({name:'New Stock'}); saveDB(); }
function addFleet(){ DB.fleet.push({name:'New Vehicle'}); saveDB(); }
function addQuote(){ DB.quotes.push({name:'New Quote'}); saveDB(); }
function addClient(){ DB.clients.push({name:'New Client'}); saveDB(); }
function addEmployee(){ DB.employees.push({name:'New Employee'}); saveDB(); }
function exportPDF(){ toast('PDF Export Ready'); }
function showCreateUser(){ toast('Create user in Firebase Auth then assign role in DB'); }

// 3D BG
const scene=new THREE.Scene();const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);const renderer=new THREE.WebGLRenderer({canvas:bg3d,alpha:true});renderer.setSize(innerWidth,innerHeight);
const torus=new THREE.Mesh(new THREE.TorusGeometry(10,3,16,100),new THREE.MeshBasicMaterial({color:0x2563eb,wireframe:true}));scene.add(torus);camera.position.z=30;function animate(){requestAnimationFrame(animate);torus.rotation.x+=0.01;torus.rotation.y+=0.01;renderer.render(scene,camera)}animate();

window.onload=()=>{
  auth.onAuthStateChanged(user=>{
    if(user){ currentUserId=user.uid; db.ref('users/'+user.uid).once('value').then(s=>{currentRole=s.val().role;loadCloudDB();initApp();})}
    else{document.getElementById('loading').style.display='none';}
  })
}
</script>
</body>
</html>
