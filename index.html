<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TWINZ WORKSHOP DMS V10.2 | PRODUCTS + VAT + ROLE ACCESS</title>
<meta name="theme-color" content="#2563eb">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap');
:root{ --accent:#2563eb; --accent2:#f97316; --cyan:#00D4FF; --red:#FF0040; --green:#00D26A; --gold:#fbbf24; --purple:#8b5cf6; }
body{font-family:'Rajdhani',sans-serif;background:#000;color:#fff;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
#bg3d{position:fixed;inset:0;z-index:-1}
.quantum-text{font-family:'Orbitron',sans-serif;font-weight:900;text-shadow:0 0 15px var(--cyan)}
.glass{background:rgba(10,20,40,0.4);backdrop-filter:blur(25px);border:1px solid rgba(0,212,255,0.3);border-radius:24px}
.neon-border{box-shadow:0 0 20px rgba(0,212,255,0.4)}
.btn{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;padding:14px 24px;border-radius:14px;font-weight:900;border:none;cursor:pointer;transition:0.3s;min-height:48px}
.btn:hover{transform:scale(1.05) translateY(-2px);box-shadow:0 0 30px var(--accent)}
.btn.gold{background:linear-gradient(135deg,var(--gold),#f59e0b);color:#000}
.btn.ai{background:linear-gradient(135deg,var(--purple),#ec4899)}
.btn-sec{background:rgba(0,212,255,0.1);border:1px solid var(--cyan);color:var(--cyan);padding:10px 18px;border-radius:12px;cursor:pointer;min-height:48px}
.btn-danger{background:rgba(255,0,64,0.2);border:1px solid var(--red);color:var(--red)}
input,select,textarea{background:#0A0F1F;border:1px solid rgba(0,212,255,0.4);color:#fff;padding:14px;border-radius:12px;width:100%;min-height:48px;font-size:16px}
.hidden{display:none}.tab-btn{padding:12px 20px;border-radius:12px;cursor:pointer;font-weight:700}
.tab-btn.active{background:var(--cyan);color:#000;box-shadow:0 0 20px var(--cyan)}
.link-box{background:#000;border:3px solid var(--cyan);padding:14px;border-radius:12px;font-family:monospace;font-size:14px;user-select:all;color:var(--cyan);width:100%}
.admin-bar{background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);border-bottom:2px solid var(--cyan);padding:12px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;position:sticky;top:0;z-index:100;}
.share-link{background:rgba(31,41,55,0.6);padding:12px;border-radius:10px;word-break:break-all;font-size:0.9rem;border:1px solid var(--cyan);color:var(--cyan);}
.grid{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:768px){.grid{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}}
.stat{padding:20px;border:1px solid rgba(37,99,235,0.3);border-radius:16px;background:rgba(15,23,42,0.5)}
.stat.num{font-size:32px;font-weight:900;color:var(--accent)}
.map{width:100%;height:300px;background:#000;border-radius:12px;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center}
.product-img{width:100%;height:180px;object-fit:cover;border-radius:12px}
.badge{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:900}
.badge.paid{background:var(--green);color:#000}
.badge.unpaid{background:var(--red);color:#fff}
.switch{position:relative;display:inline-block;width:50px;height:24px}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#ccc;transition:.4s;border-radius:24px}
.slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background-color:white;transition:.4s;border-radius:50%}
input:checked +.slider{background-color:var(--green)}
input:checked +.slider:before{transform:translateX(26px)}
</style>
</head>
<body>
<canvas id="bg3d"></canvas>

<!-- LOGIN -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
  <div class="glass p-10 max-w-2xl w-full neon-border">
    <h1 class="text-6xl text-center quantum-text mb-2">TWINZ DMS</h1>
    <p class="text-center text-cyan-400 mb-8">V10.2 | PRODUCTS + VAT + ACCESS CONTROL</p>
    <div class="grid grid-cols-3 gap-4">
      <div onclick="selectRole('CEO')" class="glass p-6 text-center cursor-pointer"><div class="text-5xl">👑</div><b class="text-orange-500">CEO</b></div>
      <div onclick="selectRole('WORKSHOP_MANAGER')" class="glass p-6 text-center cursor-pointer"><div class="text-5xl">🔧</div><b class="text-green-500">WORKSHOP</b></div>
      <div onclick="selectRole('RECEPTION')" class="glass p-6 text-center cursor-pointer"><div class="text-5xl">📞</div><b class="text-cyan-500">RECEPTION</b></div>
      <div onclick="selectRole('SALES')" class="glass p-6 text-center cursor-pointer"><div class="text-5xl">💰</div><b class="text-gold">SALES</b></div>
      <div onclick="selectRole('HR')" class="glass p-6 text-center cursor-pointer"><div class="text-5xl">👥</div><b class="text-purple-400">HR</b></div>
      <div onclick="selectRole('FLEET')" class="glass p-6 text-center cursor-pointer"><div class="text-5xl">🚛</div><b class="text-cyan-400">FLEET</b></div>
      <div onclick="selectRole('TECHNICIAN')" class="glass p-6 text-center cursor-pointer"><div class="text-5xl">⚙️</div><b class="text-cyan-400">TECH</b></div>
    </div>
    <div id="passBox" class="hidden mt-6">
      <input id="password" type="password" placeholder="PIN: 1234">
      <button onclick="login()" class="btn w-full mt-3">ENTER SYSTEM</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="admin-bar">
    <span class="quantum-text text-orange-500" id="roleBadge">CEO</span>
    <button class="btn" style="width:auto" onclick="logout()">Logout</button>
    <button class="btn-sec" style="width:auto" onclick="generateClientLink()">CLIENT LINK</button>
  </div>
  <div class="p-4 md:p-8">
    <div id="shareLinkBox" style="display:none;margin-bottom:15px" class="glass p-4">
      <h4 class="text-cyan-400 font-bold">Client Link Ready</h4>
      <div class="share-link mt-2" id="shareLink"></div>
      <button class="btn w-full mt-2" onclick="copyLink()">📋 COPY LINK</button>
    </div>

    <div class="flex gap-3 mb-6 overflow-x-auto">
      <button onclick="showTab('dashboard')" class="tab-btn active">Dashboard</button>
      <button onclick="showTab('jobs')" class="tab-btn">Job Cards</button>
      <button onclick="showTab('products')" class="tab-btn" id="prodTab">Products</button>
      <button onclick="showTab('stock')" class="tab-btn" id="stockTab">Parts</button>
      <button onclick="showTab('sales')" class="tab-btn">Sales</button>
      <button onclick="showTab('fleet')" class="tab-btn">Fleet</button>
      <button onclick="showTab('quotes')" class="tab-btn">Quotes</button>
      <button onclick="showTab('clients')" class="tab-btn">Client Portal</button>
      <button onclick="showTab('payroll')" class="tab-btn" id="payTab">HR & Payroll</button>
      <button onclick="showTab('reports')" class="tab-btn">Reports</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="tab">
      <div class="grid">
        <div class="stat"><h4>Revenue MTD</h4><div class="stat num" id="statRevenue">R0</div></div>
        <div class="stat"><h4>Payroll</h4><div class="stat num" id="statPayroll">R0</div></div>
        <div class="stat"><h4>Active Jobs</h4><div class="stat num" id="statJobs">0</div></div>
        <div class="stat"><h4>Products</h4><div class="stat num" id="statProducts">0</div></div>
      </div>
    </div>

    <!-- PRODUCTS WITH UPLOAD -->
    <div id="products" class="tab hidden">
      <div class="glass p-5 mb-4">
        <h3 class="text-xl mb-3">Upload Product</h3>
        <input id="pName" placeholder="Product Name">
        <input id="pCode" placeholder="Product Code">
        <textarea id="pDesc" placeholder="Description"></textarea>
        <input id="pPrice" type="number" placeholder="Price R">
        <label class="block mt-2">Product Image URL</label>
        <input id="pImg" placeholder="https://...jpg">
        <label class="block mt-2">Product Video URL</label>
        <input id="pVideo" placeholder="https://youtube.com/...">
        <button onclick="saveProduct()" class="btn w-full mt-3">UPLOAD PRODUCT</button>
      </div>
      <div id="productList" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
    </div>

    <!-- STOCK -->
    <div id="stock" class="tab hidden">
      <div class="glass p-5 mb-4">
        <input id="sName" placeholder="Part Name">
        <input id="sQty" type="number" placeholder="Qty">
        <input id="sMin" type="number" placeholder="Min Alert">
        <input id="sCost" type="number" placeholder="Cost">
        <input id="sImg" placeholder="Image URL">
        <button onclick="addStock()" class="btn w-full mt-2">ADD PART</button>
      </div>
      <div id="stockList"></div>
    </div>

    <!-- SALES WITH VAT + PAID TOGGLE -->
    <div id="sales" class="tab hidden">
      <div class="glass p-5 mb-4">
        <input id="invClient" placeholder="Customer Name">
        <input id="invPhone" placeholder="Phone 27...">
        <textarea id="invItems" placeholder="Item | Qty | Price"></textarea>
        <label class="flex items-center gap-3 mt-2"><span>VAT 15%</span><label class="switch"><input type="checkbox" id="vatToggle"><span class="slider"></span></label></label>
        <label class="flex items-center gap-3 mt-2"><span>PAID</span><label class="switch"><input type="checkbox" id="paidToggle"><span class="slider"></span></label></label>
        <button onclick="generateInvoice()" class="btn gold w-full mt-3">GENERATE INVOICE PDF</button>
        <button onclick="sendInvoiceWA()" class="btn ai w-full mt-2">SEND INVOICE VIA WHATSAPP</button>
      </div>
    </div>

    <!-- JOBS -->
    <div id="jobs" class="tab hidden">
      <div id="reader" class="hidden w-full max-w-sm mb-3"></div>
      <div class="glass p-5 mb-4">
        <div class="grid grid-cols-2">
          <input id="jClient" placeholder="Customer Name"><input id="jPhone" placeholder="27...">
          <input id="jReg" placeholder="Vehicle: BMW F30"><input id="jBarcode" placeholder="Part # Barcode">
          <select id="jStatus"><option>QUOTED</option><option>IN PROGRESS</option><option>QC</option><option>READY</option><option>INVOICED</option></select>
          <input id="jAmount" type="number" placeholder="Amount R">
        </div>
        <button onclick="saveJob()" class="btn w-full mt-3">SAVE JOB CARD</button>
      </div>
      <div id="jobcards"></div>
    </div>

    <!-- OTHER TABS KEPT -->
    <div id="fleet" class="tab hidden"><div class="glass p-5"><input id="fReg" placeholder="Vehicle Reg"><button onclick="addFleet()" class="btn w-full mt-2">ADD FLEET</button><div id="fleetList" class="mt-3"></div></div></div>
    <div id="quotes" class="tab hidden"><div class="glass p-5"><input id="qClient" placeholder="Client"><textarea id="qItems" placeholder="Item | Qty | Price"></textarea><button onclick="saveQuote()" class="btn w-full mt-2">GENERATE QUOTE PDF</button><div id="quoteList" class="mt-3"></div></div></div>
    <div id="clients" class="tab hidden"><div id="clientLinks"></div></div>
    <div id="payroll" class="tab hidden"><div class="glass p-5"><input id="empName" placeholder="Employee Name"><input id="empSalary" type="number" placeholder="Salary R"><button onclick="addEmployee()" class="btn mt-2">ADD EMPLOYEE</button><div id="empList" class="mt-4"></div></div></div>
    <div id="reports" class="tab hidden"><button onclick="exportCSV()" class="btn">📊 EXPORT CSV</button><button onclick="exportPDF()" class="btn ml-2">📄 EXPORT PDF</button></div>
  </div>
</div>

<!-- CLIENT VIEW -->
<div id="clientView" class="hidden p-6"><div class="glass p-6 neon-border"><h2 class="text-4xl quantum-text mb-4">TWINZ CLIENT PORTAL</h2><div id="clientProducts" class="grid grid-cols-1 md:grid-cols-3 gap-3"></div></div></div>

<script>
const { jsPDF } = window.jspdf;
let DB = JSON.parse(localStorage.getItem('twinz_db_god')) || {jobs:[],parts:[],fleet:[],stock:[],quotes:[],employees:[],audit:[],users:[],bookings:[],products:[],revenue:125000};
let currentRole='';

// ROLE ACCESS LEVELS
const ACCESS = {
  CEO: ['dashboard','jobs','products','stock','sales','fleet','quotes','clients','payroll','reports'],
  WORKSHOP_MANAGER: ['dashboard','jobs','stock','products'],
  RECEPTION: ['dashboard','jobs','clients','quotes'],
  SALES: ['dashboard','sales','products','quotes'],
  HR: ['dashboard','payroll'],
  FLEET: ['dashboard','fleet'],
  TECHNICIAN: ['dashboard','jobs']
};

function saveDB(){localStorage.setItem('twinz_db_god',JSON.stringify(DB));updateStats();}

function selectRole(r){currentRole=r;document.getElementById('passBox').classList.remove('hidden')}
function login(){if(document.getElementById('password').value==='1234'){localStorage.setItem('twinz_role_god',currentRole);initApp()}else alert("Wrong PIN")}
function logout(){localStorage.removeItem('twinz_role_god');location.reload();}

function initApp(){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('roleBadge').innerText=currentRole;

  // HIDE TABS BASED ON ROLE
  document.querySelectorAll('.tab').forEach(t=>t.classList.add('hidden'));
  document.querySelectorAll('.tab-btn').forEach(b=>{
    if(!ACCESS[currentRole].includes(b.getAttribute('onclick').match(/'(.+?)'/)[1])) b.style.display='none';
    else b.style.display='block';
  });
  showTab('dashboard');
  renderAll();
}

function showTab(id){document.querySelectorAll('.tab').forEach(t=>t.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active')}

// PRODUCTS WITH IMAGE/VIDEO
function saveProduct(){
  const prod = {
    id:Date.now(),
    name:document.getElementById('pName').value,
    code:document.getElementById('pCode').value,
    desc:document.getElementById('pDesc').value,
    price:+document.getElementById('pPrice').value,
    img:document.getElementById('pImg').value,
    video:document.getElementById('pVideo').value
  };
  DB.products.push(prod); saveDB(); renderProducts();
  ['pName','pCode','pDesc','pPrice','pImg','pVideo'].forEach(id=>document.getElementById(id).value='');
}
function renderProducts(){
  const el=document.getElementById('productList');
  el.innerHTML=DB.products.map(p=>`
    <div class="glass p-3">
      <img src="${p.img||'https://via.placeholder.com/300'}" class="product-img mb-2">
      <b>${p.name}</b><br>
      <span class="text-cyan-400">${p.code}</span><br>
      R${p.price}<br>
      <p class="text-sm mt-1">${p.desc}</p>
      ${p.video?`<a href="${p.video}" target="_blank" class="btn-sec w-full mt-2">▶ WATCH VIDEO</a>`:''}
      <button onclick="requestProduct('${p.code}','${p.name}',${p.price})" class="btn-sec w-full mt-2">📩 REQUEST QUOTE</button>
    </div>
  `).join('');
  document.getElementById('statProducts').innerText=DB.products.length;
}
function requestProduct(code,name,price){
  const msg=`*PRODUCT REQUEST*%0AProduct: ${name}%0ACode: ${code}%0APrice: R${price}%0AFrom: TWINZ CLIENT`;
  window.open(`https://wa.me/27799097420?text=${msg}`,'_blank');
}

// STOCK WITH IMAGE
function addStock(){
  DB.stock.push({
    id:Date.now(),
    name:document.getElementById('sName').value,
    qty:+document.getElementById('sQty').value,
    min:+document.getElementById('sMin').value,
    cost:+document.getElementById('sCost').value,
    img:document.getElementById('sImg').value
  });
  saveDB(); renderStock();
}
function renderStock(){
  const el=document.getElementById('stockList');
  el.innerHTML=DB.stock.map(s=>`
    <div class="glass p-3 mb-2 flex gap-3">
      <img src="${s.img||'https://via.placeholder.com/60'}" class="w-16 h-16 rounded">
      <div>${s.name} - Qty:${s.qty} Cost:R${s.cost} ${s.qty<s.min?'<span class="text-red-400">LOW</span>':''}</div>
    </div>
  `).join('');
}

// INVOICE WITH VAT + PAID + WHATSAPP
function generateInvoice(){
  const items=document.getElementById('invItems').value;
  const client=document.getElementById('invClient').value;
  const subtotal = items.split('\n').reduce((a,l)=>a+(+l.split('|')[2]||0),0);
  const vat = document.getElementById('vatToggle').checked? subtotal*0.15 : 0;
  const total = subtotal + vat;
  const paid = document.getElementById('paidToggle').checked;

  const doc=new jsPDF();
  doc.text("TWINZ INVOICE",20,20);
  doc.text(`Client: ${client}`,20,30);
  doc.text(`Subtotal: R${subtotal}`,20,40);
  doc.text(`VAT 15%: R${vat}`,20,50);
  doc.text(`TOTAL: R${total}`,20,60);
  doc.text(`Status: ${paid?'PAID':'UNPAID'}`,20,70);
  doc.save(`INVOICE_${client}.pdf`);
}
function sendInvoiceWA(){
  const phone=document.getElementById('invPhone').value;
  const client=document.getElementById('invClient').value;
  const paid=document.getElementById('paidToggle').checked;
  const msg=`*TWINZ INVOICE*%0AClient: ${client}%0AStatus: ${paid?'PAID':'UNPAID'}%0AView: ${window.location.href}#client`;
  window.open(`https://wa.me/27${phone.replace(/\D/g,'')}?text=${msg}`,'_blank');
}

// JOBS
function saveJob(){const job={id:Date.now(),client:document.getElementById('jClient').value,phone:document.getElementById('jPhone').value,reg:document.getElementById('jReg').value,barcode:document.getElementById('jBarcode').value,status:document.getElementById('jStatus').value,amount:+document.getElementById('jAmount').value||0};DB.jobs.push(job);saveDB();renderJobs();}
function renderJobs(){const el=document.getElementById('jobcards');el.innerHTML='';DB.jobs.slice(-20).reverse().forEach(j=>{
  el.innerHTML+=`<div class="glass p-4 mb-3"><div class="flex justify-between"><b>${j.reg}</b> <span class="text-green-400">R${j.amount}</span></div><p>${j.client} | ${j.status}</p></div>`;
});document.getElementById('statJobs').innerText=DB.jobs.filter(j=>j.status!=='INVOICED').length}

// OTHER FUNCTIONS KEPT
function addFleet(){DB.fleet.push({id:Date.now(),reg:document.getElementById('fReg').value});saveDB();renderFleet();}
function renderFleet(){document.getElementById('fleetList').innerHTML=DB.fleet.map(f=>`<div class="glass p-3 mb-2">${f.reg}</div>`).join('');}
function saveQuote(){DB.quotes.push({id:Date.now(),client:document.getElementById('qClient').value,items:document.getElementById('qItems').value});saveDB();renderQuotes();}
function renderQuotes(){document.getElementById('quoteList').innerHTML=DB.quotes.map(q=>`<div class="glass p-3 mb-2">${q.client}</div>`).join('')}
function addEmployee(){DB.employees.push({id:Date.now(),name:document.getElementById('empName').value,salary:+document.getElementById('empSalary').value});saveDB();renderEmp();}
function renderEmp(){document.getElementById('empList').innerHTML=DB.employees.map(e=>`<div class="glass p-3 mb-2">${e.name} - R${e.salary.toLocaleString()}</div>`).join('')}
function exportCSV(){let csv="Job,Client,Amount\n";DB.jobs.forEach(j=>csv+=`${j.reg},${j.client},${j.amount}\n`);const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv]));a.download="TWINZ_Report.csv";a.click()}
function exportPDF(){const doc=new jsPDF();doc.text("TWINZ REPORT",20,20);doc.text(`Jobs:${DB.jobs.length}`,20,30);doc.save("TWINZ_REPORT.pdf")}
function generateClientLink(){ const baseUrl = window.location.origin + window.location.pathname; document.getElementById('shareLink').innerText = baseUrl + '#client'; document.getElementById('shareLinkBox').style.display = 'block'; }
function copyLink(){navigator.clipboard.writeText(document.getElementById('shareLink').innerText); alert('Link Copied!');}

function updateStats(){ const payroll=DB.employees.reduce((a,b)=>a+b.salary,0); document.getElementById('statRevenue').innerText='R'+DB.revenue.toLocaleString(); document.getElementById('statPayroll').innerText='R'+payroll.toLocaleString(); }
function renderAll(){renderJobs();renderFleet();renderProducts();renderStock();renderQuotes();renderEmp();}

window.onload=()=>{const r=localStorage.getItem('twinz_role_god');if(r){currentRole=r;initApp()}}
</script>
</body>
</html>
