<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TWINZ WORKSHOP DMS V10.0 | PSM GRADE</title>
<meta name="theme-color" content="#2563eb">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap');
:root{ --accent:#2563eb; --accent2:#f97316; --cyan:#00D4FF; --red:#FF0040; --green:#00D26A; }
body{font-family:'Rajdhani',sans-serif;background:#000;color:#fff;overflow-x:hidden}
#bg3d{position:fixed;inset:0;z-index:-1}
.quantum-text{font-family:'Orbitron',sans-serif;font-weight:900;text-shadow:0 0 15px var(--cyan)}
.glass{background:rgba(10,20,40,0.4);backdrop-filter:blur(25px);border:1px solid rgba(0,212,255,0.3);border-radius:24px}
.neon-border{box-shadow:0 0 20px rgba(0,212,255,0.4)}
.btn{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;padding:14px 24px;border-radius:14px;font-weight:900;border:none;cursor:pointer;transition:0.3s}
.btn:hover{transform:scale(1.05) translateY(-2px);box-shadow:0 0 30px var(--accent)}
.btn-sec{background:rgba(0,212,255,0.1);border:1px solid var(--cyan);color:var(--cyan);padding:10px 18px;border-radius:12px;cursor:pointer}
.btn-danger{background:rgba(255,0,64,0.2);border:1px solid var(--red);color:var(--red)}
input,select,textarea{background:#0A0F1F;border:1px solid rgba(0,212,255,0.4);color:#fff;padding:14px;border-radius:12px;width:100%;min-height:48px}
.hidden{display:none}.tab-btn{padding:12px 20px;border-radius:12px;cursor:pointer;font-weight:700}
.tab-btn.active{background:var(--cyan);color:#000;box-shadow:0 0 20px var(--cyan)}
.link-box{background:#000;border:3px solid var(--cyan);padding:14px;border-radius:12px;font-family:monospace;font-size:14px;user-select:all;color:var(--cyan);width:100%}
.admin-bar{background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);border-bottom:2px solid var(--cyan);padding:12px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;position:sticky;top:0;z-index:100;}
.share-link{background:rgba(31,41,55,0.6);padding:12px;border-radius:10px;word-break:break-all;font-size:0.9rem;border:1px solid var(--cyan);color:var(--cyan);}
</style>
</head>
<body>
<canvas id="bg3d"></canvas>

<!-- LOGIN -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
  <div class="glass p-10 max-w-2xl w-full neon-border">
    <h1 class="text-6xl text-center quantum-text mb-2">TWINZ DMS</h1>
    <p class="text-center text-cyan-400 mb-8">V10.0 | ENTERPRISE GRADE</p>
    <div class="grid grid-cols-3 gap-4">
      <div onclick="selectRole('CEO')" class="glass p-6 text-center cursor-pointer"><div class="text-5xl">👑</div><b class="text-orange-500">CEO</b></div>
      <div onclick="selectRole('WORKSHOP_MANAGER')" class="glass p-6 text-center cursor-pointer"><div class="text-5xl">🔧</div><b class="text-green-500">WORKSHOP</b></div>
      <div onclick="selectRole('RECEPTION')" class="glass p-6 text-center cursor-pointer"><div class="text-5xl">📞</div><b class="text-cyan-500">RECEPTION</b></div>
    </div>
    <div id="passBox" class="hidden mt-6"><input id="password" type="password" placeholder="PIN: 1234"><button onclick="login()" class="btn w-full mt-3">ENTER SYSTEM</button></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="admin-bar">
    <span class="quantum-text text-orange-500" id="roleBadge">CEO</span>
    <button class="btn" style="width:auto" onclick="logout()">Logout</button>
    <button class="btn-sec" style="width:auto" onclick="generateClientLink()">GENERATE CLIENT LINK</button>
    <button class="btn-sec" style="width:auto" onclick="startScanner()">📷 SCAN</button>
  </div>
  <div class="p-4 md:p-8">
    <div id="shareLinkBox" style="display:none;margin-bottom:15px" class="glass p-4">
      <h4 class="text-cyan-400 font-bold">Client Link Ready</h4>
      <div class="share-link mt-2" id="shareLink"></div>
      <button class="btn w-full mt-2" onclick="copyLink()">📋 COPY LINK</button>
    </div>

    <header class="glass p-5 flex justify-between items-center mb-6 neon-border">
      <h2 class="text-3xl quantum-text">TWINZ WORKSHOP</h2>
    </header>

    <div class="flex gap-3 mb-6 overflow-x-auto">
      <button onclick="showTab('dashboard')" class="tab-btn active">Dashboard</button>
      <button onclick="showTab('jobs')" class="tab-btn">Job Cards</button>
      <button onclick="showTab('fleet')" class="tab-btn">Fleet</button>
      <button onclick="showTab('stock')" class="tab-btn">Parts</button>
      <button onclick="showTab('quotes')" class="tab-btn">Quotes</button>
      <button onclick="showTab('clients')" class="tab-btn">Client Portal</button>
      <button onclick="showTab('payroll')" class="tab-btn">HR & Payroll</button>
      <button onclick="showTab('reports')" class="tab-btn">Reports</button>
    </div>

    <div id="dashboard" class="tab">
      <div class="grid grid-cols-4 gap-4">
        <div class="glass p-5"><p class="text-5xl" id="statJobs">0</p><p>Active Jobs</p></div>
        <div class="glass p-5"><p class="text-5xl text-green-400" id="statRev">R0</p><p>Revenue</p></div>
        <div class="glass p-5"><p class="text-5xl text-red-400" id="statStock">0</p><p>Low Stock</p></div>
        <div class="glass p-5"><p class="text-5xl" id="statFleet">0</p><p>Fleet</p></div>
      </div>
      <div class="glass p-5 mt-4"><h3 class="font-bold text-xl mb-2">SECURITY LOG</h3><div id="auditLog"></div></div>
    </div>

    <div id="jobs" class="tab hidden">
      <div id="reader" class="hidden w-full max-w-sm mb-3"></div>
      <div class="glass p-5 mb-4">
        <div class="grid grid-cols-2 gap-3">
          <input id="jClient" placeholder="Customer Name"><input id="jPhone" placeholder="27...">
          <input id="jReg" placeholder="Vehicle: BMW F30"><input id="jBarcode" placeholder="Part # Barcode">
          <select id="jStatus"><option>QUOTED</option><option>IN PROGRESS</option><option>QC</option><option>READY</option><option>INVOICED</option></select>
          <input id="jAmount" type="number" placeholder="Amount R">
        </div>
        <button onclick="saveJob()" class="btn w-full mt-3">SAVE JOB CARD</button>
      </div>
      <div id="jobList"></div>
    </div>

    <div id="fleet" class="tab hidden"><div class="glass p-5 mb-4"><input id="fReg" placeholder="Vehicle Reg"><input id="fLocation" placeholder="Location"><button onclick="addFleet()" class="btn w-full mt-2">ADD FLEET</button></div><div id="fleetList"></div></div>
    <div id="stock" class="tab hidden"><div class="glass p-5 mb-4"><input id="sName" placeholder="Part Name"><input id="sQty" type="number" placeholder="Qty"><input id="sMin" type="number" placeholder="Min Alert"><input id="sCost" type="number" placeholder="Cost"><button onclick="addStock()" class="btn w-full mt-2">ADD PART</button></div><div id="stockList"></div></div>
    <div id="quotes" class="tab hidden"><div class="glass p-5 mb-4"><input id="qClient" placeholder="Client"><textarea id="qItems" placeholder="Item | Qty | Price"></textarea><button onclick="saveQuote()" class="btn w-full mt-2">GENERATE QUOTE PDF</button></div><div id="quoteList"></div></div>
    <div id="clients" class="tab hidden"><div id="clientLinks"></div></div>
    <div id="payroll" class="tab hidden"><div class="glass p-5"><input id="empName" placeholder="Employee Name"><input id="empSalary" type="number" placeholder="Salary R"><button onclick="addEmployee()" class="btn mt-2">ADD EMPLOYEE</button></div><div id="empList" class="mt-4"></div></div>
    <div id="reports" class="tab hidden"><button onclick="exportCSV()" class="btn">📊 EXPORT CSV</button><button onclick="exportPDF()" class="btn ml-2">📄 EXPORT PDF</button></div>
  </div>
</div>

<!-- CLIENT VIEW -->
<div id="clientView" class="hidden p-6"><div class="glass p-6 neon-border"><h2 class="text-4xl quantum-text mb-4">TWINZ CLIENT PORTAL</h2><div id="clientJobs"></div></div></div>

<script>
const { jsPDF } = window.jspdf;
let DB = JSON.parse(localStorage.getItem('twinz_db_god')) || {jobs:[],parts:[],fleet:[],stock:[],quotes:[],employees:[],audit:[]};
let currentRole=''; let html5QrCode; let currentShareLink = '';

function saveDB(){localStorage.setItem('twinz_db_god',JSON.stringify(DB));}
function addAudit(action){DB.audit.unshift({time:new Date().toLocaleString(),user:currentRole,action});if(DB.audit.length>50)DB.audit.pop();saveDB()}

// 3D BG FROM PSM
const scene=new THREE.Scene();const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);const renderer=new THREE.WebGLRenderer({canvas:bg3d,alpha:true});renderer.setSize(innerWidth,innerHeight);
const torus=new THREE.Mesh(new THREE.TorusGeometry(10,3,16,100),new THREE.MeshBasicMaterial({color:0x2563eb,wireframe:true}));scene.add(torus);camera.position.z=30;function animate(){requestAnimationFrame(animate);torus.rotation.x+=0.01;torus.rotation.y+=0.01;renderer.render(scene,camera)}animate();

// LOGIN - TWINZ PIN
function selectRole(r){currentRole=r;passBox.classList.remove('hidden')}
function login(){if(password.value==='1234'){localStorage.setItem('twinz_role_god',currentRole);initApp()}else alert("Wrong PIN")}
function logout(){localStorage.removeItem('twinz_role_god');location.reload();}

function initApp(){
  loginScreen.classList.add('hidden');app.classList.remove('hidden');roleBadge.innerText=currentRole;
  if(currentRole==="RECEPTION"){ document.querySelectorAll('#payroll,#reports,#stock').forEach(el=>el.classList.add('hidden')); }
  renderAll();
}

function showTab(id){document.querySelectorAll('.tab').forEach(t=>t.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active')}

// CLIENT LINK - FROM PSM
function generateClientLink(){
  const baseUrl = window.location.origin + window.location.pathname;
  currentShareLink = baseUrl + '#client';
  document.getElementById('shareLink').innerText = currentShareLink;
  document.getElementById('shareLinkBox').style.display = 'block';
}
function copyLink(){navigator.clipboard.writeText(currentShareLink); alert('Link Copied!');}

// BARCODE SCANNER - FROM PSM
function startScanner(){document.getElementById('reader').classList.remove('hidden');html5QrCode=new Html5Qrcode("reader");html5QrCode.start({facingMode:"environment"},{fps:10},(code)=>{document.getElementById('jBarcode').value=code;html5QrCode.stop();document.getElementById('reader').classList.add('hidden')})}

// JOBS
function saveJob(){const job={id:Date.now(),client:document.getElementById('jClient').value,phone:document.getElementById('jPhone').value,reg:document.getElementById('jReg').value,barcode:document.getElementById('jBarcode').value,status:document.getElementById('jStatus').value,amount:+document.getElementById('jAmount').value||0};DB.jobs.push(job);saveDB();renderJobs();addAudit(`Job: ${job.reg}`);}
function renderJobs(){const el=document.getElementById('jobList');el.innerHTML='';DB.jobs.slice(-20).reverse().forEach(j=>{
  el.innerHTML+=`<div class="glass p-4 mb-3">
    <div class="flex justify-between"><b>${j.reg}</b> <span class="text-green-400">R${j.amount}</span></div>
    <p>${j.client} | ${j.status}</p>
    <div class="flex gap-2 mt-2">
      <button onclick="genPDF(${j.id})" class="btn-sec text-xs">PDF INVOICE</button>
      <button onclick="sendWA('${j.phone}','${j.reg}','${j.status}')" class="btn-sec text-xs">WHATSAPP</button>
    </div>
  </div>`;
});document.getElementById('statJobs').innerText=DB.jobs.filter(j=>j.status!=='INVOICED').length;document.getElementById('statRev').innerText='R'+DB.jobs.reduce((a,b)=>a+b.amount,0).toLocaleString()}
function genPDF(id){const j=DB.jobs.find(x=>x.id===id);const doc=new jsPDF();doc.text("TWINZ INVOICE",20,20);doc.text(`Client:${j.client}`,20,30);doc.text(`Vehicle:${j.reg}`,20,40);doc.text(`TOTAL:R${j.amount}`,20,60);doc.save(`TWINZ_${j.reg}.pdf`)}
function sendWA(phone,reg,status){window.open(`https://wa.me/27${phone.replace(/\D/g,'')}?text=*TWINZ UPDATE*%0A${reg}: ${status}%0ATrack: ${window.location.href}#client`,'_blank')}

// FLEET
function addFleet(){DB.fleet.push({id:Date.now(),reg:document.getElementById('fReg').value,location:document.getElementById('fLocation').value});saveDB();renderFleet();}
function renderFleet(){const el=document.getElementById('fleetList');el.innerHTML='';DB.fleet.forEach(f=>el.innerHTML+=`<div class="glass p-3 mb-2">${f.reg} - ${f.location}</div>`);document.getElementById('statFleet').innerText=DB.fleet.length}

// STOCK
function addStock(){DB.stock.push({id:Date.now(),name:document.getElementById('sName').value,qty:+document.getElementById('sQty').value,min:+document.getElementById('sMin').value,cost:+document.getElementById('sCost').value});saveDB();renderStock();}
function renderStock(){const el=document.getElementById('stockList');el.innerHTML='';let low=0;DB.stock.forEach(s=>{if(s.qty<s.min)low++;el.innerHTML+=`<div class="glass p-3 mb-2">${s.name} - Qty:${s.qty} ${s.qty<s.min?'<span class="text-red-400">LOW</span>':''}</div>`});document.getElementById('statStock').innerText=low}

// QUOTES
function saveQuote(){DB.quotes.push({id:Date.now(),client:document.getElementById('qClient').value,items:document.getElementById('qItems').value});const doc=new jsPDF();doc.text(`QUOTE: ${document.getElementById('qClient').value}`,20,20);doc.save(`QUOTE.pdf`);saveDB();renderQuotes();}
function renderQuotes(){const el=document.getElementById('quoteList');el.innerHTML='';DB.quotes.forEach(q=>el.innerHTML+=`<div class="glass p-3 mb-2">${q.client}</div>`)}

// PAYROLL
function addEmployee(){DB.employees.push({id:Date.now(),name:document.getElementById('empName').value,salary:+document.getElementById('empSalary').value});saveDB();renderEmp();}
function renderEmp(){const el=document.getElementById('empList');el.innerHTML='';DB.employees.forEach(e=>el.innerHTML+=`<div class="glass p-3 mb-2">${e.name} - R${e.salary.toLocaleString()}</div>`)}

// REPORTS
function exportCSV(){let csv="Job,Client,Amount\n";DB.jobs.forEach(j=>csv+=`${j.reg},${j.client},${j.amount}\n`);const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv]));a.download="TWINZ_Report.csv";a.click()}
function exportPDF(){const doc=new jsPDF();doc.text("TWINZ REPORT",20,20);doc.text(`Jobs:${DB.jobs.length}`,20,30);doc.save("TWINZ_REPORT.pdf")}

// CLIENT VIEW
function checkClientView(){
  if(window.location.hash === '#client'){
    loginScreen.classList.add('hidden');app.classList.add('hidden');clientView.classList.remove('hidden');
    document.getElementById('clientJobs').innerHTML=DB.jobs.map(j=>`<div class="glass p-3 mb-2">${j.reg} - ${j.status}</div>`).join('');
  }
}

// AUDIT
function renderAudit(){document.getElementById('auditLog').innerHTML=DB.audit.slice(0,10).map(a=>`<p class="text-xs">${a.time} - ${a.user}: ${a.action}</p>`).join('')}

function renderAll(){renderJobs();renderFleet();renderStock();renderQuotes();renderEmp();renderAudit()}
window.onload=()=>{const r=localStorage.getItem('twinz_role_god');if(r){currentRole=r;initApp()}checkClientView()}
</script>
</body>
</html>
