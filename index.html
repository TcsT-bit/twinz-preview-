<style>

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap');
:root{ --accent:#2563eb; --accent2:#f97316; --cyan:#00D4FF; --red:#FF0040; --green:#00D26A; --gold:#fbbf24; --purple:#8b5cf6; }
body{font-family:'Rajdhani',sans-serif;background:#000;color:#fff;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
#bg3d{position:fixed;inset:0;z-index:-1}
.quantum-text{font-family:'Orbitron',sans-serif;font-weight:900;text-shadow:0 0 15px var(--cyan)}
.glass{background:rgba(10,20,40,0.4);backdrop-filter:blur(25px);border:1px solid rgba(0,212,255,0.3);border-radius:24px}
.neon-border{box-shadow:0 0 20px rgba(0,212,255,0.4)}
.btn{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;padding:14px 24px;border-radius:14px;font-weight:900;border:none;cursor:pointer;transition:0.3s;min-height:48px}
.btn:hover{transform:scale(1.05) translateY(-2px);box-shadow:0 0 30px var(--accent)}
.btn.gold{background:linear-gradient(135deg,var(--gold),#f59e0b);color:#000}
.btn.ai{background:linear-gradient(135deg,var(--purple),#ec4899)}
.btn-sec{background:rgba(0,212,255,0.1);border:1px solid var(--cyan);color:var(--cyan);padding:10px 18px;border-radius:12px;cursor:pointer;min-height:48px}
.btn-danger{background:rgba(255,0,64,0.2);border:1px solid var(--red);color:var(--red)}
input,select,textarea{background:#0A0F1F;border:1px solid rgba(0,212,255,0.4);color:#fff;padding:14px;border-radius:12px;width:100%;min-height:48px;font-size:16px}
.hidden{display:none}.tab-btn{padding:12px 20px;border-radius:12px;cursor:pointer;font-weight:700}
.tab-btn.active{background:var(--cyan);color:#000;box-shadow:0 0 20px var(--cyan)}
.link-box{background:#000;border:3px solid var(--cyan);padding:14px;border-radius:12px;font-family:monospace;font-size:14px;user-select:all;color:var(--cyan);width:100%}
.admin-bar{background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);border-bottom:2px solid var(--cyan);padding:12px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;position:sticky;top:0;z-index:100;}
.share-link{background:rgba(31,41,55,0.6);padding:12px;border-radius:10px;word-break:break-all;font-size:0.9rem;border:1px solid var(--cyan);color:var(--cyan);}
.grid{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:768px){.grid{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}}
.stat{padding:20px;border:1px solid rgba(37,99,235,0.3);border-radius:16px;background:rgba(15,23,42,0.5)}
.stat.num{font-size:32px;font-weight:900;color:var(--accent)}
.map{width:100%;height:300px;background:#000;border-radius:12px;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center}

.badge.unpaid{background:var(--red);color:#fff}
.switch{position:relative;display:inline-block;width:50px;height:24px}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#ccc;transition:.4s;border-radius:24px}
.slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background-color:white;transition:.4s;border-radius:50%}
input:checked +.slider{background-color:var(--green)}
input:checked +.slider:before{transform:translateX(26px)}

<!-- LOGIN WITH 2FA -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
  <div class="glass p-10 max-w-2xl w-full neon-border">
    <h1 class="text-6xl text-center quantum-text mb-2">TWINZ DMS</h1>

<!-- YOUR APP HTML HERE -->

<div id="clientView" class="hidden p-6"><div class="glass p-6 neon-border"><h2 class="text-4xl quantum-text mb-4">TWINZ CLIENT PORTAL</h2><div id="clientProducts" class="grid grid-cols-1 md:grid-cols-3 gap-3"></div><div id="clientJobs" class="mt-4"></div></div></div>

<script>
const { jsPDF } = window.jspdf;

// YOUR REAL FIREBASE CONFIG INJECTED
const firebaseConfig = {
  apiKey: "AIzaSyCy83BBRf12FlAOoWgg1jQO5eyWTYlhTeQ",
  authDomain: "twinz-dms.firebaseapp.com",
  databaseURL: "https://twinz-dms-default-rtdb.africa-south1.firebasedatabase.app",
  projectId: "twinz-dms",
  storageBucket: "twinz-dms.firebasestorage.app",
  messagingSenderId: "757498432732",
  appId: "1:757498432732:web:4ac54b82d97edaabd07819"
};
firebase.initializeApp(firebaseConfig);

// APP CHECK INJECTED
const appCheck = firebase.appCheck();
appCheck.activate('DEBUG_MODE_FOR_NOW', true);

const auth = firebase.auth();
const db = firebase.database();

let DB = {jobs:[],parts:[],fleet:[],stock:[],quotes:[],employees:[],audit:[],users:[],bookings:[],salaries:[],clockLogs:[],products:[],revenue:125000};
let currentRole=''; let currentUserId='';

function toast(msg){ const t=document.createElement('div'); t.style.cssText='position:fixed;bottom:20px;right:16px;left:16px;background:var(--accent);color:#fff;padding:14px 20px;border-radius:12px;font-weight:900;z-index:999;text-align:center'; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }

// SECURITY: INPUT SANITIZE
function sanitize(str){ return str.replace(/[<>\"']/g,''); }

// FIREBASE AUTH WITH RATE LIMIT
let loginAttempts = 0;
function loginFirebase(){
  const email=sanitize(document.getElementById('loginEmail').value);
  const pass=document.getElementById('loginPassword').value;

  if(pass.length<8){ toast('Password must be 8+ characters'); return; }
  if(loginAttempts>5){ toast('Too many attempts. Wait 5min'); return; }

  auth.signInWithEmailAndPassword(email,pass).then(cred=>{
    currentUserId=cred.user.uid;
    db.ref('users/'+currentUserId).once('value').then(snap=>{
      if(!snap.exists()){ toast('No role assigned. Contact CEO'); auth.signOut(); return; }
      currentRole=snap.val().role;
      loadCloudDB();
      initApp();
      loginAttempts=0;
    })
  }).catch(e=>{
    loginAttempts++;
    toast('Login failed: '+e.message);
  });
}

// ONLY CEO CAN CREATE USERS
function registerFirebase(){
  if(currentRole!=='CEO'){ toast('Only CEO can create staff'); return; }
  const email=sanitize(document.getElementById('loginEmail').value);
  const pass=document.getElementById('loginPassword').value;
  const role=document.getElementById('loginRole').value;
  auth.createUserWithEmailAndPassword(email,pass).then(cred=>{
    db.ref('users/'+cred.user.uid).set({email,role,createdBy:currentUserId,createdAt:Date.now()});
    toast('Staff Created');
  }).catch(e=>alert(e.message));
}

function logout(){auth.signOut();localStorage.clear();location.reload();}

// SECURE DB WITH VALIDATION
function saveDB(){
  const cleanDB = JSON.parse(JSON.stringify(DB)); // deep clone
  db.ref('data/'+currentUserId).set(cleanDB);
  updateStats();
}
function loadCloudDB(){
  db.ref('data/'+currentUserId).on('value', snap=>{
    if(snap.val()) DB=snap.val();
    renderAll();
    document.getElementById('loading').style.display='none';
  })
}

const ACCESS = { CEO: ['dashboard','jobs','products','stock','sales','fleet','quotes','clients','payroll','security','reports'], WORKSHOP_MANAGER: ['dashboard','jobs','products','stock'], RECEPTION: ['dashboard','jobs','clients','quotes'], SALES: ['dashboard','sales','products','quotes'], HR: ['dashboard','payroll'], FLEET: ['dashboard','fleet'], TECHNICIAN: ['dashboard','jobs'], SECURITY: ['dashboard','security'], CUSTOMER: [] };

// 3D BG
const scene=new THREE.Scene();const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);const renderer=new THREE.WebGLRenderer({canvas:bg3d,alpha:true});renderer.setSize(innerWidth,innerHeight);
const torus=new THREE.Mesh(new THREE.TorusGeometry(10,3,16,100),new THREE.MeshBasicMaterial({color:0x2563eb,wireframe:true}));scene.add(torus);camera.position.z=30;function animate(){requestAnimationFrame(animate);torus.rotation.x+=0.01;torus.rotation.y+=0.01;renderer.render(scene,camera)}animate();

function initApp(){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('roleBadge').innerText=currentRole;
  document.querySelectorAll('.tab').forEach(t=>t.classList.add('hidden'));
  document.querySelectorAll('.tab-btn').forEach(b=>{
    const tabId = b.getAttribute('onclick').match(/'(.+?)'/)[1];
    if(!ACCESS[currentRole].includes(tabId)) b.style.display='none'; else b.style.display='block';
  });
  showTab('dashboard');
}

function showTab(id){document.querySelectorAll('.tab').forEach(t=>t.classList.add('hidden'));document.getElementById(id).classList.remove('hidden'); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');}

// PASTE ALL YOUR FUNCTIONS HERE
// REMEMBER: Every function that writes must call saveDB()

window.onload=()=>{
  auth.onAuthStateChanged(user=>{
    if(user){ currentUserId=user.uid; db.ref('users/'+user.uid).once('value').then(s=>{currentRole=s.val().role;loadCloudDB();initApp();})}
    else{document.getElementById('loading').style.display='none';}
  })
}
</script>
