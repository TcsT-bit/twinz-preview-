name: Deploy to GitHub Pages
on: {push: {branches: [main]}}
jobs: {deploy: {runs-on: ubuntu-latest, steps: [{uses: actions/checkout@v4},{uses: actions/setup-node@v4, with: {node-version: 20}},{run: npm install, working-directory: apps/web},{run: npm run build, working-directory: apps/web},{uses: actions/upload-pages-artifact@v3, with: {path: apps/web/dist}},{uses: actions/deploy-pages@v4}]}}
